name: Package macOS Release

on:
  workflow_dispatch:
    inputs:
      runtime:
        description: macOS runtime to package
        required: true
        default: osx-arm64
        type: choice
        options:
          - osx-arm64
          - osx-x64
          - all
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  package-macos:
    name: Build macOS package
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package settings
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_label="${GITHUB_REF_NAME}"
          else
            release_label="${RELEASE_LABEL:-v0.1.0}"
          fi

          package_version="${release_label#[vV]}"

          runtime="${{ github.event.inputs.runtime }}"
          if [[ -z "$runtime" ]]; then
            runtime="osx-arm64"
          fi

          echo "RELEASE_LABEL=$release_label" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$package_version" >> "$GITHUB_ENV"
          echo "PACKAGE_RUNTIME=$runtime" >> "$GITHUB_ENV"

      - name: Restore
        run: env -u VERSION dotnet restore -p:Version="$PACKAGE_VERSION" -p:PackageVersion="$PACKAGE_VERSION"

      - name: Build
        run: env -u VERSION dotnet build --configuration Release --no-restore -p:Version="$PACKAGE_VERSION" -p:PackageVersion="$PACKAGE_VERSION"

      - name: Test
        run: env -u VERSION dotnet test --configuration Release --no-build -p:Version="$PACKAGE_VERSION" -p:PackageVersion="$PACKAGE_VERSION"

      - name: Make macOS package script executable
        run: chmod +x scripts/package-macos.sh

      - name: Package macOS release
        run: env -u VERSION RELEASE_LABEL="$RELEASE_LABEL" PACKAGE_VERSION="$PACKAGE_VERSION" ./scripts/package-macos.sh "$PACKAGE_RUNTIME"

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-${{ env.RELEASE_LABEL }}-${{ env.PACKAGE_RUNTIME }}
          path: artifacts/Biomedical-Instrumentation-Signal-Plotter-*-macos-*.zip
          if-no-files-found: error
